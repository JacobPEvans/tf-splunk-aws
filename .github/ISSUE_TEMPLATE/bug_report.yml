name: Bug Report
description: Report a bug or unexpected behavior
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `tofu plan`
        2. See error...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the priority level for this bug
      options:
        - "priority:critical - Blocking, needs immediate attention"
        - "priority:high - Significant impact, address soon"
        - "priority:medium - Normal workflow"
        - "priority:low - Minor issue, address when possible"
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      description: Estimated effort to fix
      options:
        - "size:xs - Trivial fix, under an hour"
        - "size:s - Small fix, a few hours"
        - "size:m - Moderate effort, 1-2 days"
        - "size:l - Large effort, 3-5 days"
        - "size:xl - Very large, needs breakdown"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots about the bug.
    validations:
      required: false
